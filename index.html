<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>SUSI – DANERS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
:root{--black:#111;--white:#ffffff;--cream:#f8f7f4;--tan:#d4a574;--sage:#7a9e7e;--gray:#888;--border:#e0e0e0;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Poppins',sans-serif;font-weight:300;background:#fff;color:var(--black);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;}

/* ── NAV (matches index.html / menu.html / jobs.html / about.html / isemarkt.html) ── */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 2001;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(255, 255, 255, 0.97);
  backdrop-filter: blur(10px);
  transition: background 0.3s;
}
nav.open {
  background: #ffffff;
  backdrop-filter: none;
}
.nav-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}

/* HAMBURGER BUTTON */
.hamburger {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
  width: 32px;
  height: 32px;
  flex-shrink: 0;
  position: relative;
  z-index: 2005;
}
.hamburger span {
  display: block;
  width: 24px;
  height: 1.5px;
  background: var(--black);
  transition: transform .3s, opacity .3s;
  transform-origin: center;
}
.hamburger.open span:nth-child(1) {
  transform: translateY(7.5px) rotate(45deg);
}
.hamburger.open span:nth-child(2) {
  opacity: 0;
}
.hamburger.open span:nth-child(3) {
  transform: translateY(-7.5px) rotate(-45deg);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 20px;
  position: relative;
  z-index: 2005;
}
.lang-switcher{display:flex;align-items:center;gap:2px;background:rgba(0,0,0,.05);border-radius:20px;padding:3px 4px;}
.lang-btn{font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;padding:4px 10px;border:none;cursor:pointer;border-radius:16px;background:transparent;color:var(--gray);transition:all .2s;}
.lang-btn.active{background:var(--black);color:#fff;}
.lang-btn:hover:not(.active){color:var(--black);}
.nav-social{display:flex;gap:16px;align-items:center;}
.nav-social a{color:var(--black);text-decoration:none;display:flex;align-items:center;transition:opacity .2s;}
.nav-social a:hover{opacity:.4;}

/* ── SUSI TITLE (now page content, sits below nav like every other page's title) ── */
.loc-hero-title {
  text-align: center;
  width: 100%;
  background: #ffffff;
  padding: 40px 24px 20px;
  transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
}
.loc-hero-title h1 {
  font-size: clamp(24px, 4.5vw, 42px);
  font-weight: 900;
  letter-spacing: 0.05em;
  line-height: 1.1;
  margin: 0;
  text-transform: uppercase;
  color: var(--black);
}
.loc-hero-title p {
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gray);
  margin-top: 8px;
}

/* ── OVERLAY MENU (left-side drawer on desktop; shifts page content right, matches other pages) ── */
.overlay-menu {
  display: flex;
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  width: 50%;
  z-index: 2000;
  background: #ffffff;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start; 
  padding: 110px 24px 60px;
  overflow-y: auto;
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
}
.overlay-menu.open { 
  transform: translateX(0);
}

.overlay-inner-content {
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(18px, 4vh, 32px);
}

.overlay-menu a, .nav-item-label {
  font-size: 26px;
  font-weight: 800;
  text-decoration: none;
  color: var(--black);
  text-transform: uppercase;
  letter-spacing: -.5px;
  padding: 2px 0;
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  user-select: none;
}
.overlay-menu > div.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.overlay-menu a::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  right: 50%;
  height: 2.5px;
  background: var(--black);
  transition: left .25s, right .25s;
}
.overlay-menu a:hover::after { left: 0; right: 0; }
.nav-dropdown a::after { display: none; }

.nav-item { cursor: pointer; text-align: center; width: 100%; }
.nav-item-label svg { transition: transform .25s; flex-shrink: 0; width: 16px; height: 16px; }
.nav-item.open .nav-item-label svg { transform: rotate(180deg); }

.nav-dropdown {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 0 4px;
}
.nav-item.open .nav-dropdown { display: flex; }
.nav-dropdown a {
  font-family: 'Poppins', sans-serif;
  font-size: 18px;
  font-weight: 400;
  text-decoration: none;
  color: var(--gray);
  padding: 6px 28px;
  border-radius: 4px;
  transition: color .2s, background .2s;
}
.nav-dropdown a:hover { color: var(--black); background: rgba(0,0,0,.05); }

/* MAIN LAYOUT */
main {
  flex: 1;
  padding-top: 90px;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  transition: margin-left 0.35s cubic-bezier(0.25, 1, 0.5, 1), width 0.35s cubic-bezier(0.25, 1, 0.5, 1);
} 
body.menu-open main {
  margin-left: 50%;
  width: 50%;
}

.page-wrap{display:flex;flex-direction:column;align-items:center;padding:32px 48px 64px;}
.content-wide{width:100%;max-width:860px;margin-top:20px;text-align:center;display:flex;flex-direction:column;align-items:center;}

.image-container {
  width: 100%;
  max-width: 920px;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
}
.coming-soon-img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 4px;
}
.hours-table {
  width: 100%;       /* Ensures it takes up the full width of its parent */
  max-width: 300px;  /* Keeps it from getting too wide */
  border-collapse: collapse;
}

.hours-table td {
  font-family: 'Poppins', sans-serif;
  font-weight: 700;        /* Consistent bold weight */
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #111;
  padding: 4px 0;
}

/* Forces the first column (Days) to the left */
.hours-table td:nth-child(1) {
  text-align: left;
}

/* Forces the second column (Times) to the right */
.hours-table td:nth-child(2) {
  text-align: left;      /* Change from right to left */
  padding-left: 21px;    /* This creates the consistent gap you see in your design */
  width: auto;           /* Let it flow naturally */
}
.do-row td:nth-child(2) {
  padding-left: 20px; /* Adjust this value to get exactly the space you want */
}
.info-grid{display:flex;flex-direction:column;align-items:flex-start;gap:40px;margin-top:28px;text-align:left;width:100%;max-width:520px;}
.info-card{padding:10px 0;width:100%;max-width:400px;text-align:left;}
.info-card h3{
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: black;
  margin-bottom: 14px;
}
.info-card p{
  font-family: 'Poppins', sans-serif !important;
  font-size: 14px !important;
  font-weight: 700 !important; /* Forces bold everywhere */
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #111 !important;
  margin: 0 0 4px 0; /* Keeps lines uniform */
  line-height: 1.6;/* Changed from #333 to black */
}
.info-card strong{color:var(--black);}

/* MINIMAL FOOTER */
.footer-minimal {
  background: #fff;
  color: rgba(0,0,0,.45);
  padding: 24px 48px;
  border-top: 1px solid var(--border);
  margin-top: auto; 
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
  font-size: 12px;
  letter-spacing: .02em;
  transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
}
body.menu-open .footer-minimal {
  width: 100%;
  padding-left: 32px;
  padding-right: 32px;
}
.footer-legal {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
}
.footer-legal a {
  color: rgba(0,0,0,.55);
  text-decoration: underline;
  text-decoration-color: rgba(0,0,0,.25);
  transition: color .2s;
  white-space: nowrap;
}
.footer-legal a:hover { color: var(--black); }
.footer-copy {
  white-space: nowrap;
  margin-left: auto;
  text-align: right;
}

@media(max-width:900px){
  nav{padding:18px 20px;}
  main { padding-top: 85px; }
  .loc-hero-title { padding: 30px 24px 16px; }
  .page-wrap{padding:32px 24px 52px;}
  .info-grid{gap:32px;}
  .footer-minimal { padding: 24px 24px; }
  .overlay-menu { padding-top: 100px; }
}
@media(max-width:600px){
  nav{padding:16px 16px;}
  main { padding-top: 70px; }
  .loc-hero-title { padding: 24px 16px 12px; }

  body.menu-open main {
    margin-left: 0;
    width: 100%;
  }
  body.menu-open .footer-minimal {
    margin-left: 0;
    width: 100%;
    padding: 20px 16px;
  }
  body.menu-open .loc-hero-title {
    opacity: 0;
    visibility: hidden;
    display: none;
  }

  .overlay-menu {
    width: 100%;
    padding: 90px 16px 40px;
    border-right: none;
  }

  .page-wrap{padding:32px 16px 44px;}
  .image-container { max-width: 520px; }
  
  .footer-minimal {
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
    padding: 20px 16px;
  }
  .footer-copy {
    margin-left: 0;
    text-align: center;
  }
  .footer-legal {
    justify-content: center;
    gap: 14px;
  }
}
</style>
</head>
<body>

      </div>
    </div>
  </div>
</nav>

<div class="overlay-menu" id="overlayMenu">
  <div class="overlay-inner-content">
    <a href="index.html" data-i18n="nav-home">Home</a>
    <a href="menu.html" data-i18n="nav-menu">Menü</a>
    <div class="nav-item" id="navLocItem">
      <div class="nav-item-label">
        <span data-i18n="nav-locations">Locations</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="nav-dropdown">
        <a href="isemarkt.html" data-i18n="nav-isemarkt">Isemarkt</a>
        <a href="susi.html" data-i18n="nav-susi">Sternschanze</a>
      </div>
    </div>
    <a href="jobs.html" data-i18n="nav-jobs">Jobs</a>
    <a href="contact.html" data-i18n="nav-contact">Kontakt</a>
    <a href="about.html" data-i18n="nav-about">Über uns</a>
  </div>
</div>

<main>
  <div class="loc-hero-title">
    <h1 data-i18n="nav-susi">SUSI</h1>
    <p data-i18n="loc-susi-sub">Sternschanze | Susannenstr. 1</p>
  </div>

  <div class="page-wrap">
    <div class="content-wide">
      <div class="image-container">
        <img class="coming-soon-img" src="images/comingsoon.jpg" alt="Coming Soon Sternschanze">
      </div>

      <div class="info-grid">
        <div class="info-card">
  
  <table class="hours-table">
    <tr><td>MO. – MI.</td><td>11.00–21.00</td></tr>
    <tr class="do-row"><td>DO.</td><td>11.00–23.00</td></tr>
    <tr><td>FR. – SA.</td><td>11.00–01.00</td></tr>
    <tr><td>SO.</td><td>11.00–21.00</td></tr>
  </table>
</div>
        <div class="info-card">
          
          <p>Susannenstr. 1<br>20357 Hamburg<br></p>
          
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="footer-minimal">
  <div class="footer-legal">
    <a href="imprint.html" data-i18n="f-imprint">Imprint</a>
    <a href="privacy.html" data-i18n="f-privacy">Data Privacy</a>
  </div>
  <div class="footer-copy" data-i18n="fcopy">© 2026 DANERS – Beef & Bread GmbH</div>
</footer>

<script>
const menuBtn=document.getElementById('menuBtn');
const overlayMenu=document.getElementById('overlayMenu');
const mainNavbar=document.getElementById('mainNavbar');

function closeMenu() {
  overlayMenu.classList.remove('open');
  menuBtn.classList.remove('open');
  mainNavbar.classList.remove('open');
  document.body.classList.remove('menu-open');
  document.body.style.overflow='';
}

menuBtn.addEventListener('click',()=>{
  const o=overlayMenu.classList.toggle('open');
  menuBtn.classList.toggle('open',o);
  mainNavbar.classList.toggle('open',o);
  document.body.classList.toggle('menu-open',o);
  const isMobile = window.matchMedia('(max-width:600px)').matches;
  document.body.style.overflow = (o && isMobile) ? 'hidden' : '';
});

overlayMenu.querySelectorAll('a').forEach(a=>a.addEventListener('click', closeMenu));

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&overlayMenu.classList.contains('open')){
    closeMenu();
  }
});

const navLocItem=document.getElementById('navLocItem');
if(navLocItem){
  navLocItem.querySelector('.nav-item-label').addEventListener('click',()=>navLocItem.classList.toggle('open'));
}

const translations={
  "de": {
    "nav-home": "Home", "nav-about": "Über uns", "nav-menu": "Menü", "nav-locations": "Locations", "nav-jobs": "Jobs", "nav-contact": "Kontakt", "nav-isemarkt": "Isemarkt", "nav-susi": "SUSI", "fcopy": "© 2026 DANERS – Beef & Bread GmbH", "f-imprint": "Impressum", "f-privacy": "Datenschutz", "loc-hours": "Öffnungszeiten", "loc-address": "Adresse", "loc-susi-sub": "Sternschanze | Susannenstr. 1", "loc-coming-title": "Demnächst mehr Informationen", "loc-coming-text": "Diese Seite wird gerade eingerichtet. Schau bald wieder vorbei!", "loc-sbahn": "S-Bahn: Sternschanze (S3/S31)"
  }, 
  "en": {
    "nav-home": "Home", "nav-about": "About Us", "nav-menu": "Menu", "nav-locations": "Locations", "nav-jobs": "Jobs", "nav-contact": "Contact", "nav-isemarkt": "Isemarkt", "nav-susi": "SUSI", "fcopy": "© 2026 DANERS – Beef & Bread GmbH", "f-imprint": "Imprint", "f-privacy": "Data Privacy", "loc-hours": "Opening Hours", "loc-address": "Address", "loc-susi-sub": "Sternschanze | Susannenstr. 1", "loc-coming-title": "More Information Coming Soon", "loc-coming-text": "This page is being set up. Check back soon!", "loc-sbahn": "S-Bahn: Sternschanze (S3/S31)"
  }
};

let currentLang=localStorage.getItem('daners_lang')||'de';
function applyLang(lang){
  currentLang=lang;
  localStorage.setItem('daners_lang',lang);
  const t=translations[lang]||{};
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(t[k] !== undefined && t[k] !== null) {
      el.textContent=t[k];
    }
  });
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  document.documentElement.lang=lang;
}
document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.lang)));
applyLang(currentLang);
</script>
</body>
