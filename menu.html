<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Menü – DANERS’</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
/* ── CORE STYLES ── */
:root {
  --black: #111;
  --white: #ffffff;
  --cream: #f8f7f4;
  --tan: #d4a574;
  --sage: #7a9e7e;
  --gray: #888;
  --border: #e0e0e0;
}
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html {
  scroll-behavior: smooth;
  background: #ffffff !important;
}
body {
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
  background: #ffffff !important;
  color: var(--black);
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── FIXED TOP NAVIGATION BAR (matches index.html) ── */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 2001;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(255, 255, 255, 0.97);
  backdrop-filter: blur(10px);
  transition: background 0.3s;
}
nav.open {
  background: #ffffff;
  backdrop-filter: none;
}
.nav-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}

.hamburger {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
  width: 32px;
  height: 32px;
  flex-shrink: 0;
  position: relative;
  z-index: 2005; 
}
.hamburger span {
  display: block;
  width: 24px;
  height: 1.5px;
  background: var(--black);
  transition: transform .3s, opacity .3s;
  transform-origin: center;
}
.hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

.nav-right {
  display: flex;
  align-items: center;
  gap: 20px;
  position: relative;
  z-index: 2005;
}
.lang-switcher {
  display: flex;
  align-items: center;
  gap: 2px;
  background: rgba(0,0,0,.05);
  border-radius: 20px;
  padding: 3px 4px;
}
.lang-btn {
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .06em;
  padding: 4px 10px;
  border: none;
  cursor: pointer;
  border-radius: 16px;
  background: transparent;
  color: var(--gray);
  transition: all .2s;
}
.lang-btn.active {
  background: var(--black);
  color: #fff;
}
.lang-btn:hover:not(.active) { color: var(--black); }

.nav-social {
  display: flex;
  gap: 16px;
  align-items: center;
}
.nav-social a {
  color: var(--black);
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity .2s;
}
.nav-social a:hover { opacity: .4; }

/* ── PAGE TITLE HEADER (now page content, sits below the nav like index.html's slogan) ── */
.menu-title-header {
  text-align: center;
  width: 100%;
  background: #ffffff;
  padding: 40px 24px 20px;
  transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
}
.menu-title-header h1 {
  font-size: clamp(24px, 4.5vw, 42px);
  font-weight: 900;
  letter-spacing: 0.05em;
  line-height: 1.1;
  margin: 0;
  text-transform: uppercase;
  color: var(--black);
}
.menu-title-header p {
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gray);
  margin-top: 8px;
}

/* ── SIDE DRAWER OVERLAY MENU (Restored Previous Style) ── */
.overlay-menu {
  display: flex;
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  width: 50%; 
  z-index: 2000;
  background: #ffffff;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start; 
  padding: 110px 24px 60px;  /* matches index.html — nav is now the same single-row height */
  overflow-y: auto;
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
}
.overlay-menu.open { 
  transform: translateX(0);
}

.overlay-inner-content {
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(18px, 4vh, 32px);
}

.overlay-menu a, .nav-item-label {
  font-size: 26px;
  font-weight: 800;
  text-decoration: none;
  color: var(--black);
  text-transform: uppercase;
  letter-spacing: -.5px;
  padding: 2px 0;
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  user-select: none;
}
.overlay-menu > div.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.overlay-menu a::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  right: 50%;
  height: 2.5px;
  background: var(--black);
  transition: left .25s, right .25s;
}
.overlay-menu a:hover::after { left: 0; right: 0; }
.nav-dropdown a::after { display: none; }

.nav-item { cursor: pointer; text-align: center; width: 100%; }
.nav-item-label svg { transition: transform .25s; flex-shrink: 0; width: 16px; height: 16px; }
.nav-item.open .nav-item-label svg { transform: rotate(180deg); }

.nav-dropdown {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 0 4px;
}
.nav-item.open .nav-dropdown { display: flex; }
.nav-dropdown a {
 font-family: 'Poppins', sans-serif; /* Ensures consistent font */
  font-size: 14px;                   /* Matches the smaller info section size */
  font-weight: 500;                  /* Matches the bold weight */
  text-transform: uppercase;         /* Matches the uppercase look */
  letter-spacing: 0.15em;            /* Matches the spacing in your image */
  text-decoration: none;
  color: var(--gray);
  padding: 8px 28px;
  border-radius: 4px;
  transition: color .2s, background .2s;
}
.nav-dropdown a:hover { color: var(--black); background: rgba(0,0,0,.05); }

/* ── LAYOUT MECHANICS WITH VISIBLE SHIFTING CONTENT ── */
main {
  flex: 1;
  padding-top: 90px; 
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  transition: margin-left 0.35s cubic-bezier(0.25, 1, 0.5, 1), width 0.35s cubic-bezier(0.25, 1, 0.5, 1);
}

body.menu-open main {
  margin-left: 50%;
  width: 50%;
}

.menu-page-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #ffffff;
  width: 100%;
  padding: 8px 0 64px; 
}

.menu-content-container {
  width: 100%;
  max-width: 900px;
  padding: 0 32px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.menu-img-container {
  width: 100%;
  display: flex;
  justify-content: center;
}
.menu-img-container img {
  display: block;
  width: auto;
  height: auto;
  max-width: 100%;
  max-height: calc(100vh - 210px);
  object-fit: contain;
}

.menu-note-container {
  width: 100%;
  max-width: 82%; 
  margin: 44px auto 0 auto;
  text-align: center;
}
.menu-note-text {
  font-size: 14px;
  line-height: 1.9;
  color: #333;
  font-weight: 700;
  letter-spacing: 0.02em;
  text-transform: uppercase; 
  background: #ffffff; 
  word-spacing: 0.05em;
  display: block;
  width: 100%;
}

/* ── MINIMAL FOOTER ── */
.footer-minimal {
  background: #fff;
  color: rgba(0,0,0,.45);
  padding: 24px 48px;
  border-top: 1px solid var(--border);
  margin-top: auto; 
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
  font-size: 12px;
  letter-spacing: .02em;
  transition: margin-left 0.35s cubic-bezier(0.25, 1, 0.5, 1), width 0.35s cubic-bezier(0.25, 1, 0.5, 1);
}

body.menu-open .footer-minimal {
  margin-left: 50%;
  width: 50%;
}

.footer-legal {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
}
.footer-legal a {
  color: rgba(0,0,0,.55);
  text-decoration: underline;
  text-decoration-color: rgba(0,0,0,.25);
  transition: color .2s;
  white-space: nowrap;
}
.footer-legal a:hover { color: var(--black); }
.footer-copy {
  white-space: nowrap;
  margin-left: auto;
  text-align: right;
}

/* ── RESPONSIVE MEDIA BREAKPOINTS ── */
@media(max-width:900px) {
  nav { padding: 18px 20px; }
  main { padding-top: 85px; }
  .menu-title-header { padding: 30px 24px 16px; }
  .menu-page-wrap { padding: 8px 0 52px; }
  .menu-img-container img { max-height: calc(100vh - 190px); }
  .footer-minimal { padding: 24px 24px; }
  .overlay-menu { padding-top: 100px; }
}
@media (max-width: 600px) {
  nav { padding: 16px 16px; }
  main { padding-top: 70px; }
  .menu-title-header { padding: 24px 16px 12px; }
  .menu-img-container img { max-height: calc(100vh - 145px); }
  
  body.menu-open main {
    margin-left: 0;
    width: 100%;
  }
  body.menu-open .footer-minimal {
    margin-left: 0;
    width: 100%;
  }
  body.menu-open .menu-title-header {
    margin-left: 0;
    width: 100%;
    opacity: 0;
    visibility: hidden;
    display: none; 
  }

  .overlay-menu { 
    width: 100%; 
    padding: 90px 16px 40px;
    border-right: none;
  } 
  
  .menu-page-wrap { padding: 8px 0 44px; }
  .menu-content-container { padding: 0 24px; }
  .menu-note-container { 
    max-width: 88%; 
    padding: 0; 
    margin: 35px auto 0 auto; 
  }
  .menu-note-text {
    font-size: 13px;
    line-height: 1.7;
  }
  .footer-minimal {
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
    padding: 20px 16px;
  }
  .footer-copy {
    margin-left: 0;
    text-align: center;
  }
  .footer-legal {
    justify-content: center;
    gap: 14px;
  }
}
</style>
</head>
<body>

<nav id="mainNavbar">
  <div class="nav-top-row">
    <button class="hamburger" id="menuBtn" aria-label="Menu"><span></span><span></span><span></span></button>
    <div class="nav-right">
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <div class="nav-social">
        <a href="https://www.instagram.com/danersbeefbread?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener" aria-label="Instagram"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg></a>

        <a href="https://open.spotify.com/user/31u5ibsrqur55jybbsljsm7suoyu?si=VGXnb-StS5Gnb2uL0RIUCg" target="_blank" rel="noopener" aria-label="Spotify"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.623.623 0 0 1-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 1 1-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.623.623 0 0 1 .207.857zm1.223-2.722a.78.78 0 0 1-1.072.257C14.1 12.266 10.539 11.88 7.24 12.854a.78.78 0 0 1-.453-1.49c3.757-1.142 7.708-.588 10.765 1.266a.78.78 0 0 1 .257 1.072zm.105-2.835C14.69 9.15 9.948 8.994 7.188 9.843a.936.936 0 1 1-.543-1.79c3.181-.967 8.47-.78 11.81 1.17a.936.936 0 0 1-.541 1.644z"/></svg></a>
      </div>
    </div>
  </div>
</nav>

<div class="overlay-menu" id="overlayMenu">
  <div class="overlay-inner-content">
    <a href="index.html" data-i18n="fhome">Home</a>
    <a href="menu.html" data-i18n="nav-menu">Menü</a>
    <div class="nav-item" id="navLocItem">
      <div class="nav-item-label">
        <span data-i18n="nav-locations">Locations</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="nav-dropdown">
        <a href="isemarkt.html" data-i18n="nav-isemarkt">Isemarkt</a>
        <a href="susi.html" data-i18n="nav-susi">Sternschanze</a>
      </div>
    </div>
    <a href="jobs.html" data-i18n="nav-jobs">Jobs</a>
    <a href="contact.html" data-i18n="nav-contact">Kontakt</a>
    <a href="about.html" data-i18n="nav-about">Über uns</a>
  </div>
</div>

<main>
  <div class="menu-title-header">
    <h1 data-i18n="nav-menu">MENÜ</h1>
    <p>SLOW FOOD — SERVED FAST</p>
  </div>

  <div class="menu-page-wrap">
    <div class="menu-content-container">
      <div class="menu-img-container">
        <img src="images/menu_daners.jpg" alt="DANERS’ Menü">
      </div>

      <div class="menu-note-container">
        <div class="menu-note-text" data-i18n="menu-extra-note">
          An unserem Standort in der Sternschanze wartet noch das eine oder andere Extra auf euch. Schaut vorbei und entdeckt es selbst
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="footer-minimal">
  <div class="footer-legal">
    <a href="imprint.html" data-i18n="f-imprint">Imprint</a>
    <a href="privacy.html" data-i18n="f-privacy">Data Privacy</a>
  </div>
  <div class="footer-copy" data-i18n="fcopy">© 2026 DANERS – Beef & Bread GmbH</div>
</footer>

<script>
const menuBtn=document.getElementById('menuBtn');
const overlayMenu=document.getElementById('overlayMenu');
const mainNavbar=document.getElementById('mainNavbar');

function closeMenu() {
  overlayMenu.classList.remove('open');
  menuBtn.classList.remove('open');
  mainNavbar.classList.remove('open');
  document.body.classList.remove('menu-open');
  /* Removed layout lock so content is interactable/viewable while open */
  document.body.style.overflow=''; 
}

menuBtn.addEventListener('click',()=>{
  const o=overlayMenu.classList.toggle('open');
  menuBtn.classList.toggle('open',o);
  mainNavbar.classList.toggle('open',o);
  document.body.classList.toggle('menu-open',o);
});

overlayMenu.querySelectorAll('a').forEach(a=>a.addEventListener('click', closeMenu));

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&overlayMenu.classList.contains('open')){
    closeMenu();
  }
});

const navLocItem=document.getElementById('navLocItem');
if(navLocItem)navLocItem.querySelector('.nav-item-label').addEventListener('click',()=>navLocItem.classList.toggle('open'));

const translations={
  "de": {
    "nav-about": "Über uns", 
    "menu-extra-note": "An unserem Standort in der Sternschanze wartet noch das eine oder andere Extra auf euch. Schaut vorbei und entdeckt es selbst", 
    "nav-menu": "Menü", 
    "nav-locations": "Locations", 
    "nav-jobs": "Jobs", 
    "nav-contact": "Kontakt", 
    "nav-isemarkt": "Isemarkt", 
    "nav-susi": "Sternschanze", 
    "fhome": "Home", 
    "fcopy": "© 2026 DANERS – Beef & Bread GmbH", 
    "f-imprint": "Impressum", 
    "f-privacy": "Datenschutz"
  }, 
  "en": {
    "nav-about": "About Us", 
    "menu-extra-note": "We have a few extra things to offer at our Sternschanze location. Come by and find out", 
    "nav-menu": "Menu", 
    "nav-locations": "Locations", 
    "nav-jobs": "Jobs", 
    "nav-contact": "Contact", 
    "nav-isemarkt": "Isemarkt", 
    "nav-susi": "Sternschanze", 
    "fhome": "Home", 
    "fcopy": "© 2026 DANERS – Beef & Bread GmbH", 
    "f-imprint": "Imprint", 
    "f-privacy": "Data Privacy"
  }
};
let currentLang=localStorage.getItem('daners_lang')||'de';
function applyLang(lang){
  currentLang=lang;
  localStorage.setItem('daners_lang',lang);
  const t=translations[lang]||{};
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(t[k]!=null)el.textContent=t[k];});
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  document.documentElement.lang=lang;
}
document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.lang)));
applyLang(currentLang);
</script>
</body>
