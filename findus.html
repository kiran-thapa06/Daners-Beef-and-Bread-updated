<style>
:root{--black:#111;--white:#ffffff;--gray:#888;--border:#e0e0e0;--faint:#f4f4f2;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Poppins',sans-serif;font-weight:300;background:#fff;color:var(--black);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;}

/* ── NAV (matches index.html / isemarkt.html / susi.html / contact.html) ── */
nav{position:fixed;top:0;left:0;right:0;z-index:2001;display:flex;flex-direction:row;align-items:center;justify-content:space-between;padding:15px 40px;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);transition:background .3s;}
nav.open{background:#ffffff;backdrop-filter:none;}
.nav-top-row{display:flex;align-items:center;justify-content:space-between;width:100%;}
.hamburger{display:flex;flex-direction:column;justify-content:center;gap:6px;cursor:pointer;background:none;border:none;padding:4px;width:32px;height:32px;flex-shrink:0;position:relative;z-index:2005;}
.hamburger span{display:block;width:24px;height:1.5px;background:var(--black);transition:transform .3s,opacity .3s;transform-origin:center;}
.hamburger.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg);}
.nav-right{display:flex;align-items:center;gap:clamp(10px,3vw,20px);position:relative;z-index:2005;flex-shrink:1;min-width:0;}
.lang-switcher{display:flex;align-items:center;gap:2px;background:rgba(0,0,0,.05);border-radius:20px;padding:3px 4px;}
.lang-btn{font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;padding:4px 10px;border:none;cursor:pointer;border-radius:16px;background:transparent;color:var(--gray);transition:all .2s;}
.lang-btn.active{background:var(--black);color:#fff;}
.lang-btn:hover:not(.active){color:var(--black);}
.nav-social{display:flex;gap:clamp(8px,2.5vw,16px);align-items:center;flex-shrink:0;}
.nav-social a{color:var(--black);text-decoration:none;display:flex;align-items:center;justify-content:center;transition:opacity .2s;}
.nav-social a:hover{opacity:.4;}

/* ── OVERLAY MENU ── */
.overlay-menu{display:flex;position:fixed;top:0;bottom:0;left:0;width:50%;z-index:2000;background:#ffffff;flex-direction:column;align-items:center;justify-content:flex-start;padding:110px 24px 60px;overflow-y:auto;border-right:1px solid var(--border);transform:translateX(-100%);transition:transform .35s cubic-bezier(.25,1,.5,1);}
.overlay-menu.open{transform:translateX(0);}
.overlay-inner-content{width:100%;max-width:600px;display:flex;flex-direction:column;align-items:center;gap:clamp(18px,4vh,32px);}
.overlay-menu a,.nav-item-label{font-family:'Poppins',sans-serif;font-size:26px;font-weight:800;text-decoration:none;color:var(--black);text-transform:uppercase;letter-spacing:-.5px;padding:2px 0;position:relative;display:inline-flex;align-items:center;justify-content:center;gap:6px;user-select:none;}
.overlay-menu > div.nav-item{display:flex;flex-direction:column;align-items:center;}
.overlay-menu a::after{content:'';position:absolute;bottom:0;left:50%;right:50%;height:2.5px;background:var(--black);transition:left .25s,right .25s;}
.overlay-menu a:hover::after{left:0;right:0;}
.overlay-menu a.active-page::after{left:0;right:0;}
.nav-dropdown a::after{display:none;}
.nav-item{cursor:pointer;text-align:center;width:100%;}
.nav-item-label svg{transition:transform .25s;flex-shrink:0;width:16px;height:16px;}
.nav-item.open .nav-item-label svg{transform:rotate(180deg);}
.nav-dropdown{display:none;flex-direction:column;align-items:center;gap:4px;padding:8px 0 4px;}
.nav-item.open .nav-dropdown{display:flex;}
#overlayMenu .nav-dropdown a{font-family:'Poppins',sans-serif;font-size:14px;font-weight:500;text-transform:uppercase;letter-spacing:.15em;text-decoration:none;color:var(--gray);padding:8px 28px;border-radius:4px;transition:color .2s,background .2s;}
#overlayMenu .nav-dropdown a:hover{color:var(--black);background:rgba(0,0,0,.05);}

/* ── LAYOUT ── */
main{flex:1;padding-top:60px;position:relative;z-index:1;display:flex;flex-direction:column;transition:margin-left .35s cubic-bezier(.25,1,.5,1),width .35s cubic-bezier(.25,1,.5,1);}
body.menu-open main{margin-left:50%;width:50%;}
.page-wrap{display:flex;flex-direction:column;align-items:center;padding:0 48px 64px;}

.sticky-title-bar{position:sticky;top:60px;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);text-align:center;padding:40px 48px 20px;width:100vw;margin-left:calc(-50vw + 50%);}
.sticky-title-bar .section-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);margin-top:8px;}
.sticky-title-bar .section-title{font-size:clamp(24px,4.5vw,42px);font-weight:900;letter-spacing:.05em;line-height:1.1;margin:0;}

.content-wide{width:100%;max-width:920px;margin-top:32px;}

/* ── UPCOMING STRIP ── */
.upcoming-label{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);margin-bottom:12px;}
.upcoming-strip{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px;margin-bottom:36px;border-bottom:1px solid var(--border);scrollbar-width:thin;-webkit-overflow-scrolling:touch;}
.upcoming-strip::-webkit-scrollbar{height:4px;}
.upcoming-strip::-webkit-scrollbar-thumb{background:var(--border);}
.upcoming-chip{flex-shrink:0;display:flex;flex-direction:column;gap:6px;padding:12px 16px;border:1.5px solid var(--black);background:#fff;cursor:pointer;transition:background .2s,color .2s;min-width:150px;}
.upcoming-chip:hover{background:var(--black);color:#fff;}
.upcoming-chip:hover .chip-loc{color:rgba(255,255,255,.65);}
.chip-date{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.chip-title{font-size:13px;font-weight:600;letter-spacing:.02em;line-height:1.3;}
.chip-loc{font-size:10px;color:var(--gray);letter-spacing:.05em;text-transform:uppercase;transition:color .2s;}

/* ── MONTH TABS ── */
.month-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.month-tabs::-webkit-scrollbar{display:none;}
.month-tab{padding:12px 20px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--gray);white-space:nowrap;transition:all .2s;margin-bottom:-1px;flex-shrink:0;}
.month-tab.active{color:var(--black);border-bottom-color:var(--black);}
.month-tab:hover:not(.active){color:var(--black);}

.cal-toprow{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin:18px 0 20px;}
.today-btn{font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:8px 16px;background:transparent;border:1.5px solid var(--black);color:var(--black);cursor:pointer;transition:all .2s;}
.today-btn:hover{background:var(--black);color:#fff;}

.legend{display:flex;flex-wrap:wrap;gap:16px;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);}
.mk{font-size:13px;line-height:1;color:var(--black);display:inline-block;width:14px;text-align:center;}

/* ── CALENDAR GRID ── */
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-top:24px;}
.cal-weekdays span{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);text-align:center;padding-bottom:10px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);}
.day-cell{background:#fff;min-height:84px;padding:8px;display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:background .15s;position:relative;}
.day-cell.empty{cursor:default;background:var(--faint);}
.day-cell:not(.empty):hover{background:var(--faint);}
.day-cell.selected{box-shadow:inset 0 0 0 999px var(--black);z-index:2;}
.day-cell.selected .day-num{color:#fff !important;font-weight:800;}
.day-cell.selected .mk{color:#fff !important;}
.day-num{font-size:13px;font-weight:600;}
.day-cell.is-today .day-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--black);}
.day-cell.selected.is-today .day-num{border-color:#fff;}
.day-markers{display:flex;gap:3px;flex-wrap:wrap;margin-top:auto;}

/* ── AGENDA PANEL ── */
.agenda-panel{margin-top:36px;padding-top:28px;border-top:1px solid var(--border);}
.agenda-date{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);margin-bottom:16px;}
.agenda-list{display:flex;flex-direction:column;gap:14px;}
.event-card{border:1.5px solid var(--black);padding:16px 18px;display:flex;gap:14px;align-items:flex-start;}
.event-card .mk{font-size:17px;margin-top:1px;}
.event-body{display:flex;flex-direction:column;gap:5px;}
.event-title{font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
.event-time{font-size:12px;font-weight:600;letter-spacing:.06em;}
.event-loc{font-size:11.5px;color:var(--gray);letter-spacing:.03em;}
.event-note{font-size:11.5px;font-style:italic;color:var(--gray);}
.event-card.closed{border-style:dashed;border-color:var(--gray);opacity:.75;}
.event-card.closed .event-title{text-decoration:line-through;text-decoration-color:var(--gray);}
.agenda-empty{font-size:13px;color:var(--gray);padding:6px 0 2px;line-height:1.7;}

/* ── FOOTER ── */
.site-footer{transition:margin-left .35s cubic-bezier(.25,1,.5,1),width .35s cubic-bezier(.25,1,.5,1);font-size:12px;letter-spacing:.02em;}
body.menu-open .site-footer{margin-left:50%;width:50%;}
.footer-legal{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.footer-legal a{font-family:'Poppins',sans-serif;font-size:12px;letter-spacing:.02em;color:rgba(0,0,0,.55);text-decoration:underline;text-decoration-color:rgba(0,0,0,.25);transition:color .2s;white-space:nowrap;}
.footer-legal a:hover{color:var(--black);}
.footer-copy{font-family:'Poppins',sans-serif;font-size:12px;letter-spacing:.02em;color:rgba(0,0,0,.45);white-space:nowrap;}

  .site-footer{flex-direction:column;align-items:center;text-align:center;padding:20px 16px;}

@media(max-width:400px){
  .day-cell{min-height:52px;}
  .upcoming-chip{min-width:130px;padding:10px 12px;}
}
</style>

const menuBtn=document.getElementById('menuBtn');
const overlayMenu=document.getElementById('overlayMenu');
const mainNavbar=document.getElementById('mainNavbar');
function closeMenu(){overlayMenu.classList.remove('open');menuBtn.classList.remove('open');mainNavbar.classList.remove('open');document.body.classList.remove('menu-open');document.body.style.overflow='';}
menuBtn.addEventListener('click',()=>{
  const o=overlayMenu.classList.toggle('open');
  menuBtn.classList.toggle('open',o);
  mainNavbar.classList.toggle('open',o);
  document.body.classList.toggle('menu-open',o);
  const isMobile=window.matchMedia('(max-width:600px)').matches;
  document.body.style.overflow=(o&&isMobile)?'hidden':'';
});
overlayMenu.querySelectorAll('a').forEach(a=>a.addEventListener('click',closeMenu));
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&overlayMenu.classList.contains('open'))closeMenu();});
const navLocItem=document.getElementById('navLocItem');

/* ══════════════════ DATE HELPERS ══════════════════ */
function pad(n){return String(n).padStart(2,'0');}
function toISO(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`;}
function todayISO(){const t=new Date();return toISO(t.getFullYear(),t.getMonth(),t.getDate());}
function dateRange(startStr,endStr){
  const out=[];
  const start=new Date(startStr+'T00:00:00');
  const end=new Date(endStr+'T00:00:00');
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    out.push(toISO(d.getFullYear(),d.getMonth(),d.getDate()));
  }
  return out;
}

dateRange('2026-11-12','2026-12-23').forEach(dateStr=>{
  const wd=new Date(dateStr+'T00:00:00').getDay(); // 0=Sun..6=Sat, 1=Mon
  if(dateStr==='2026-11-15'){

      title:'Marché de Noël – Weihnachtsmarkt',titleEn:'Marché de Noël – Christmas Market',

    return;
  }

    events.push({date:dateStr,category:'christmas',mk:'✦',closed:true,
      title:'Marché de Noël – Weihnachtsmarkt',titleEn:'Marché de Noël – Christmas Market',
      location:'Stadthöfe (Bleichenhof) · Große Bleichen 35, 20354 Hamburg',
      note:'Geschlossen – Totensonntag',noteEn:'Closed – Totensonntag (Sunday of the Dead)'});
    return;
  }
  let time;
  if(dateStr==='2026-12-23') time='12:00–18:00';
  else if(wd===1) time='15:00–22:00';
  else time='12:00–22:00';
  events.push({date:dateStr,category:'christmas',mk:'✦',
    title:'Marché de Noël – Weihnachtsmarkt',titleEn:'Marché de Noël – Christmas Market',
    location:'Stadthöfe (Bleichenhof) · Große Bleichen 35, 20354 Hamburg',

});

/* group events by date */
const eventsByDate={};
events.forEach(e=>{(eventsByDate[e.date]=eventsByDate[e.date]||[]).push(e);});
const sortedEvents=events.slice().sort((a,b)=>a.date.localeCompare(b.date));

/* ══════════════════ CALENDAR STATE ══════════════════ */
const MONTHS=[
  {year:2026,month:6},{year:2026,month:7},{year:2026,month:8},
  {year:2026,month:9},{year:2026,month:10},{year:2026,month:11}
];
const MONTH_LABELS={de:['JULI','AUGUST','SEPTEMBER','OKTOBER','NOVEMBER','DEZEMBER'],en:['JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER']};
const MONTH_LABELS_SHORT={de:['Jul','Aug','Sep','Okt','Nov','Dez'],en:['Jul','Aug','Sep','Oct','Nov','Dec']};
const WEEKDAYS={de:['MO','DI','MI','DO','FR','SA','SO'],en:['MO','TU','WE','TH','FR','SA','SU']};

let currentLang=localStorage.getItem('daners_lang')||'de';
let activeMonthIndex=0;
let selectedDate=null;

function findMonthIndexForDate(dateStr){
  const y=+dateStr.slice(0,4), m=+dateStr.slice(5,7)-1;
  return MONTHS.findIndex(mm=>mm.year===y&&mm.month===m);
}

/* pick a sensible initial state: today if within range, else first upcoming event, else July */
(function initState(){
  const t=todayISO();
  const idxToday=findMonthIndexForDate(t);
  if(idxToday>-1){
    activeMonthIndex=idxToday;
    selectedDate=t;
  } else {
    const next=sortedEvents.find(e=>e.date>=t) || sortedEvents[0];
    selectedDate=next?next.date:'2026-07-01';
    activeMonthIndex=Math.max(findMonthIndexForDate(selectedDate),0);
  }
})();

/* ══════════════════ RENDER: MONTH TABS ══════════════════ */
function renderMonthTabs(){
  const wrap=document.getElementById('monthTabs');
  wrap.innerHTML='';
  MONTHS.forEach((m,i)=>{
    const btn=document.createElement('button');
    btn.className='month-tab'+(i===activeMonthIndex?' active':'');
    btn.textContent=MONTH_LABELS[currentLang][i];
    btn.addEventListener('click',()=>{activeMonthIndex=i;renderAll();});
    wrap.appendChild(btn);
  });
}

/* ══════════════════ RENDER: WEEKDAY HEADER ══════════════════ */
function renderWeekdays(){
  const wrap=document.getElementById('calWeekdays');
  wrap.innerHTML='';
  WEEKDAYS[currentLang].forEach(w=>{
    const s=document.createElement('span');s.textContent=w;wrap.appendChild(s);
  });
}

/* ══════════════════ RENDER: CALENDAR GRID ══════════════════ */
function renderGrid(){
  const {year,month}=MONTHS[activeMonthIndex];
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  const firstDay=new Date(year,month,1).getDay();
  const offset=(firstDay+6)%7;
  const totalDays=new Date(year,month+1,0).getDate();
  const t=todayISO();

  for(let i=0;i<offset;i++){
    const empty=document.createElement('div');
    empty.className='day-cell empty';
    grid.appendChild(empty);
  }
  for(let day=1;day<=totalDays;day++){
    const dateStr=toISO(year,month,day);
    const cell=document.createElement('div');
    cell.className='day-cell';
    if(dateStr===t) cell.classList.add('is-today');
    if(dateStr===selectedDate) cell.classList.add('selected');

    const num=document.createElement('span');
    num.className='day-num';
    num.textContent=day;
    cell.appendChild(num);

    const dayEvents=(eventsByDate[dateStr]||[]).filter(e=>!e.closed);
    if(dayEvents.length){
      const markers=document.createElement('div');
      markers.className='day-markers';
      const seen=new Set();
      dayEvents.forEach(e=>{
        if(seen.has(e.category))return;
        seen.add(e.category);
        const mk=document.createElement('span');
        mk.className='mk';
        mk.textContent=e.mk;
        markers.appendChild(mk);
      });
      cell.appendChild(markers);
    }

    cell.addEventListener('click',()=>{selectedDate=dateStr;renderGrid();renderAgenda();});
    grid.appendChild(cell);
  }
}

/* ══════════════════ RENDER: UPCOMING STRIP ══════════════════ */
function renderUpcoming(){
  const wrap=document.getElementById('upcomingStrip');
  wrap.innerHTML='';
  const t=todayISO();
  const seenDates=new Set();
  const upcoming=[];
  for(const e of sortedEvents){
    if(e.date<t || e.closed) continue;
    if(seenDates.has(e.date+e.title)) continue;
    seenDates.add(e.date+e.title);
    upcoming.push(e);
    if(upcoming.length>=8) break;
  }
  if(!upcoming.length){
    wrap.style.display='none';
    return;
  }
  wrap.style.display='flex';
  upcoming.forEach(e=>{
    const chip=document.createElement('div');
    chip.className='upcoming-chip';
    const d=new Date(e.date+'T00:00:00');
    const dLabel=`${pad(d.getDate())}. ${MONTH_LABELS_SHORT[currentLang][findMonthIndexForDate(e.date)]}`;
    chip.innerHTML=`<span class="chip-date">${dLabel}</span><span class="chip-title">${currentLang==='en'?e.titleEn:e.title}</span><span class="chip-loc">${e.location}</span>`;
    chip.addEventListener('click',()=>{
      selectedDate=e.date;
      activeMonthIndex=findMonthIndexForDate(e.date);
      renderAll();
      document.getElementById('calGrid').scrollIntoView({behavior:'smooth',block:'center'});
    });
    wrap.appendChild(chip);
  });
}

/* ══════════════════ RENDER: AGENDA ══════════════════ */
function formatAgendaDate(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const weekdaysFull={de:['SONNTAG','MONTAG','DIENSTAG','MITTWOCH','DONNERSTAG','FREITAG','SAMSTAG'],en:['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY']};
  const wd=weekdaysFull[currentLang][d.getDay()];
  const monthLabel=MONTH_LABELS[currentLang][findMonthIndexForDate(dateStr)]||'';
  return `${wd}, ${d.getDate()}. ${monthLabel} ${d.getFullYear()}`;
}

function renderAgenda(){
  document.getElementById('agendaDate').textContent=formatAgendaDate(selectedDate);
  const list=document.getElementById('agendaList');
  list.innerHTML='';
  const dayEvents=eventsByDate[selectedDate]||[];
  if(!dayEvents.length){
    const empty=document.createElement('p');
    empty.className='agenda-empty';
    empty.textContent=currentLang==='en'
      ?'No events on this day. Check the dots on the calendar above, or browse upcoming dates.'
      :'An diesem Tag sind keine Termine geplant. Schau auf die Markierungen im Kalender oben oder in die nächsten Termine.';
    list.appendChild(empty);
    return;
  }
  dayEvents.forEach(e=>{
    const card=document.createElement('div');
    card.className='event-card'+(e.closed?' closed':'');
    const body=document.createElement('div');
    body.className='event-body';
    const title=document.createElement('span');
    title.className='event-title';
    title.textContent=currentLang==='en'?e.titleEn:e.title;
    body.appendChild(title);
    if(e.time){
      const time=document.createElement('span');
      time.className='event-time';
      time.textContent=e.time;
      body.appendChild(time);
    }
    const loc=document.createElement('span');
    loc.className='event-loc';
    loc.textContent=e.location;
    body.appendChild(loc);
    if(e.note||e.noteEn){
      const note=document.createElement('span');
      note.className='event-note';
      note.textContent=currentLang==='en'?(e.noteEn||e.note):(e.note||e.noteEn);
      body.appendChild(note);
    }
    const mk=document.createElement('span');
    mk.className='mk';
    mk.textContent=e.mk;
    card.appendChild(mk);
    card.appendChild(body);
    list.appendChild(card);
  });
}

/* ══════════════════ TODAY BUTTON ══════════════════ */
document.getElementById('todayBtn').addEventListener('click',()=>{
  const t=todayISO();
  const idx=findMonthIndexForDate(t);
  if(idx>-1){
    activeMonthIndex=idx;
    selectedDate=t;
  } else {
    const next=sortedEvents.find(e=>e.date>=t)||sortedEvents[0];
    selectedDate=next?next.date:selectedDate;
    activeMonthIndex=findMonthIndexForDate(selectedDate);
  }
  renderAll();
});

/* ══════════════════ MASTER RENDER ══════════════════ */
function renderAll(){
  renderMonthTabs();
  renderWeekdays();
  renderGrid();
  renderUpcoming();
  renderAgenda();
}
renderAll();

    "cal-upcoming":"UPCOMING DATES","cal-today":"TODAY",
    "cal-legend-market":"Isemarkt","cal-legend-festival":"Event / Festival","cal-legend-pride":"CSD","cal-legend-christmas":"Christmas Market"
  }
};

function applyLang(lang){
  currentLang=lang;
  localStorage.setItem('daners_lang',lang);
  const t=translations[lang]||{};
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(t[k]!=null)el.textContent=t[k];
  });
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  document.documentElement.lang=lang;
  renderAll();
}
document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.lang)));
applyLang(currentLang);
</script>
